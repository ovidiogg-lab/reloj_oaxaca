<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Oaxaca en Tiempo Real</title>
    
    <style>
       /* Fondo general con imagen a pantalla completa */
        body {
            /* 1. Imagen de fondo 
           background-image: url('fondo.jpg');
            
            /* 2. Control total de la pantalla completa sin deformar */
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            
            /* 3. Alineación del reloj */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden; /* Evita que salgan barras de navegación en la pantalla */
        }

/* Contenedor principal alineado estrictamente por la base de los números */
.reloj-contenedor-mexico {
    display: flex;
    align-items: flex-end; 
    justify-content: center;
    background: rgba(255, 255, 255, 0.0); 
    padding: 30px 45px;
    width: fit-content;
}

/* Área de cada número: Más grandes y mucho más juntos */
.digito-custom {
    margin: 0 -28px; /* <--- Subimos el valor negativo para pegar los números casi por completo */
    display: flex;
    align-items: flex-end; 
    height: 240px; /* <--- Incrementamos la altura de 180px a 240px para hacerlos más grandes */
    
    /* RESPLANDOR SUAVIZADO: Reducimos la intensidad y el alcance para que sea un brillo fino */
    filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.5));
}

/* Forzamos a que todos los SVGs midan lo mismo de alto */
.digito-custom svg {
    height: 100%;
    margin: 0 -60px; 
    width: auto; 
    display: block;
    overflow: visible; 
}

/* Dos puntos separadores ajustados al nuevo tamaño y distancia */
.separador-custom {
    font-size: 110px; /* Crecen proporcionalmente a los números */
    color: #a1be44; 
    font-family: 'Arial Rounded MT Bold', sans-serif;
    margin: 0 -15px; /* Los pegamos más al bloque de horas y minutos */
    line-height: 0.85; 
    padding-bottom: 65px; /* Subimos los dos puntos para que queden centrados con el nuevo alto de 240px */
    animation: parpadeo 1s infinite;
    
    /* Brillo suavizado también para los dos puntos */
    filter: drop-shadow(0px 0px 6px rgba(255, 255, 255, 0.5));
}

@keyframes parpadeo {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
}
    </style>
</head>
<body>

    <div class="reloj-contenedor-mexico">
        <div id="hora-decena" class="digito-custom"></div>

        <div id="minuto-decena" class="digito-custom"></div>
        <div id="minuto-unidad" class="digito-custom"></div>
    </div>

        function actualizarRelojVectores() {
            const ahora = new Date();
            const opciones = { timeZone: 'America/Mexico_City', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const [h, m, s] = ahora.toLocaleTimeString('es-MX', opciones).split(':');

            document.getElementById('hora-decena').innerHTML = disenosNumeros[h[0]];
            document.getElementById('hora-unidad').innerHTML = disenosNumeros[h[1]];
            document.getElementById('minuto-decena').innerHTML = disenosNumeros[m[0]];
            document.getElementById('minuto-unidad').innerHTML = disenosNumeros[m[1]];
            document.getElementById('segundo-decena').innerHTML = disenosNumeros[s[0]];
            document.getElementById('segundo-unidad').innerHTML = disenosNumeros[s[1]];
        }

        actualizarRelojVectores();
        setInterval(actualizarRelojVectores, 1000);
    </script>
